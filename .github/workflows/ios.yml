name: iOS starter workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test default scheme using any available iPhone simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Default Scheme
        run: |
          # Safely fetch the JSON list, extract the first target, and write it out
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo "$scheme_list" | ruby -e "require 'json'; data = JSON.parse(STDIN.gets); puts data['project']['schemes'] ? data['project']['schemes'][0] : data['project']['targets'][0]")
          echo "$default" > default_scheme.txt
          echo "Detected default scheme: $default"

      # We supply a full destination string to prevent xcodebuild from hanging on generic 'iOS Simulator'
      - name: Build
        env:
          scheme: ${{ 'default' }}
          destination: 'platform=iOS Simulator,name=iPhone Air
          destination: "generic/platform=ios Simulator
        run: |
          if [ "$scheme" = "default" ]; then scheme=$(cat default_scheme.txt); fi
          
          # Detect workspace or project safely
          if ls -A | grep -i "\.xcworkspace$" > /dev/null; then
            filetype_parameter="workspace"
            file_to_build=$(ls -A | grep -i "\.xcworkspace$" | head -n 1)
          else
            filetype_parameter="project"
            file_to_build=$(ls -A | grep -i "\.xcodeproj$" | head -n 1)
          fi
          
          # Strip accidental whitespace margins
          file_to_build=$(echo "$file_to_build" | xargs)
          
          xcodebuild build-for-testing \
            -scheme "$scheme" \
            -"$filetype_parameter" "$file_to_build" \
            -destination "$destination"

      - name: Test
        env:
          scheme: ${{ 'default' }}
          destination: 'platform=iOS Simulator,name=iPhone 15'
        run: |
          if [ "$scheme" = "default" ]; then scheme=$(cat default_scheme.txt); fi
          
          if ls -A | grep -i "\.xcworkspace$" > /dev/null; then
            filetype_parameter="workspace"
            file_to_build=$(ls -A | grep -i "\.xcworkspace$" | head -n 1)
          else
            filetype_parameter="project"
            file_to_build=$(ls -A | grep -i "\.xcodeproj$" | head -n 1)
          fi
          
          file_to_build=$(echo "$file_to_build" | xargs)
          
          xcodebuild test-without-building \
            -scheme "$scheme" \
            -"$filetype_parameter" "$file_to_build" \
            -destination "$destination"
